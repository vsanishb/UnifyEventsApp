# JVM / Memory (optimized for 16GB RAM systems)
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError

# Gradle Performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true


# Android Settings
android.useAndroidX=true
android.enableJetifier=true

# Kotlin (stability > speed for your case)
kotlin.incremental=false


# Misc (optional but safe)
org.gradle.vfs.watch=true
